<h1>Smart Retry</h1>

<p>Retries transient failures using exponential backoff.</p>

<h2>Retry Status Codes</h2>
<ul>
<li>408 — Request Timeout</li>
<li>500 — Internal Server Error</li>
<li>502 — Bad Gateway</li>
<li>503 — Service Unavailable</li>
<li>504 — Gateway Timeout</li>
</ul>

<h2>Backoff Example</h2>
<pre>
Attempt 1 → 500ms
Attempt 2 → 1000ms
Attempt 3 → 2000ms
</pre>
